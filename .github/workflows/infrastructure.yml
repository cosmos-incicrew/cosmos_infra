name: Infrastructure plan or apply

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        type: choice
        options: [plan, apply]

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"
      - run: terraform -chdir=environments/development init
      - run: terraform -chdir=environments/development plan -out=development.tfplan
      - uses: actions/upload-artifact@v4
        with:
          name: development-tfplan
          path: environments/development/development.tfplan
          retention-days: 1

  apply:
    if: inputs.action == 'apply'
    needs: plan
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"
      - uses: actions/download-artifact@v5
        with:
          name: development-tfplan
          path: environments/development
      - run: terraform -chdir=environments/development init
      - run: terraform -chdir=environments/development apply development.tfplan
