services:
  caddy:
    image: caddy:${CADDY_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - /run/cosmos/caddy.env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - /run/cosmos/api.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
