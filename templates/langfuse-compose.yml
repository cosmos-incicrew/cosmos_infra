services:
  caddy:
    image: caddy:${CADDY_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      langfuse-web:
        condition: service_healthy

  langfuse-worker:
    image: langfuse/langfuse-worker:${LANGFUSE_IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    depends_on: &langfuse-dependencies
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  langfuse-web:
    image: langfuse/langfuse:${LANGFUSE_IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on: *langfuse-dependencies
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/public/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:25
    restart: unless-stopped
    user: "101:101"
    env_file: .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    env_file: .env
    command: ["sh", "-c", "exec redis-server --requirepass \"$${REDIS_AUTH}\" --maxmemory-policy noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_AUTH}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    env_file: .env
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  redis_data:
  minio_data:
